# infra/docker-compose.yml
version: "3.9"

services:
  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [django]

  django:
    build: ./backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    ports: ["8000:8000"]
    depends_on: [postgres, redis]
    env_file: .env

  langchain-worker: #! servicio separado de Django
    build: ./backend
    command: python -m services.ai.worker
    depends_on: [django, ollama]
    env_file: .env

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: convbi
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    volumes: [redisdata:/data]

  ollama:
    image: ollama/ollama
    ports: ["11434:11434"]
    volumes: [ollama_models:/root/.ollama]
    # Para usar GPU (opcional):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  pgdata:
  redisdata:
  ollama_models:
